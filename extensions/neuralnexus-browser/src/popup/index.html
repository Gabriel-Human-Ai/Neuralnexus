<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeuralNexus Capture</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      body { width: 360px; margin: 0; color: #f5f5f7; background: #0d0d12; }
      main { padding: 18px; display: grid; gap: 14px; }
      h1 { margin: 0; font-size: 18px; letter-spacing: -0.02em; }
      p { margin: 0; color: rgba(245,245,247,.62); line-height: 1.45; }
      button, input, select, textarea { font: inherit; }
      button { min-height: 42px; border: 1px solid rgba(255,255,255,.12); border-radius: 14px; color: #f5f5f7; background: #17171d; cursor: pointer; }
      button:hover { background: #20202a; }
      button.primary { border-color: rgba(124,108,246,.5); background: linear-gradient(135deg,#7c6cf6,#4fc3f7); color: #fff; }
      .capture-grid { display: grid; gap: 8px; }
      .field { display: grid; gap: 6px; color: rgba(245,245,247,.64); font-size: 12px; }
      input, select, textarea { width: 100%; box-sizing: border-box; border: 1px solid rgba(255,255,255,.12); border-radius: 12px; color: #f5f5f7; background: #141419; padding: 10px 12px; }
      .notice, .preview { border: 1px solid rgba(255,255,255,.1); border-radius: 16px; padding: 12px; background: rgba(255,255,255,.04); }
      .preview span, .decisions span { color: rgba(245,245,247,.48); font-size: 11px; text-transform: uppercase; letter-spacing: .12em; }
      .preview strong { display: block; margin-top: 6px; }
      .status { min-height: 18px; color: rgba(245,245,247,.68); font-size: 12px; }
    </style>
  </head>
  <body>
    <main id="app"></main>
    <script type="module" src="./popup.js"></script>
  </body>
</html>
