<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NeuralNexus Capture Panel</title>
    <style>
      :root { color-scheme: dark; font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      body { margin: 0; color: #f5f5f7; background: #0d0d12; }
      main { padding: 18px; display: grid; gap: 14px; }
      h1 { margin: 0; font-size: 18px; }
      p { margin: 0; color: rgba(245,245,247,.62); line-height: 1.45; }
      button, textarea { font: inherit; }
      button { min-height: 38px; border: 1px solid rgba(255,255,255,.12); border-radius: 12px; color: #f5f5f7; background: #17171d; cursor: pointer; }
      button:hover { background: #20202a; }
      textarea { min-height: 72px; resize: vertical; border: 1px solid rgba(255,255,255,.12); border-radius: 12px; color: #f5f5f7; background: #141419; padding: 10px 12px; }
      .preview, .decisions, .notice { border: 1px solid rgba(255,255,255,.1); border-radius: 16px; padding: 12px; background: rgba(255,255,255,.04); }
      .preview span, .decisions span { color: rgba(245,245,247,.48); font-size: 11px; text-transform: uppercase; letter-spacing: .12em; }
      .preview strong { display: block; margin-top: 6px; }
      .decisions div { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 8px; margin: 10px 0; }
      .status { min-height: 18px; color: rgba(245,245,247,.68); font-size: 12px; }
    </style>
  </head>
  <body>
    <main id="app"></main>
    <script type="module" src="./sidepanel.js"></script>
  </body>
</html>
